<!DOCTYPE html>
<html>
<head>
    <title>Recipe Finder</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>🍲 Recipe Finder</h1>

    <form method="POST">
        <input type="text" name="ingredient" placeholder="Enter ingredient..." required>
        <button type="submit">Search</button>
    </form>

    <div class="results">
        {% for r in recipes %}
            <div class="card">
                <h3>{{ r[0] }}</h3>
                <p><b>Ingredients:</b> {{ r[1] }}</p>
                <p><b>Steps:</b> {{ r[2] }}</p>
            </div>
        {% endfor %}
    </div>
</body>
</html>
