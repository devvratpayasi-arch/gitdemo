<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Recipe Finder - Find Delicious Recipes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1 class="title">
                    <span class="icon"></span>
                    Recipe Finder
                </h1>
                <p class="subtitle">Discover delicious recipes based on the vegetables you have</p>
            </div>
        </header>

        <main class="main-content">
            <section class="selection-section">
                <h2 class="section-title">What vegetables do you have?</h2>
                <div id="vegetables" class="vegetables-grid">
                    {% for veg in vegetables %}
                    <label class="vegetable-item">
                        <input type="checkbox" value="{{ veg }}">
                        <span class="vegetable-label">
                            <span class="checkbox-custom"></span>
                            <span class="vegetable-name">{{ veg|title }}</span>
                        </span>
                    </label>
                    {% endfor %}
                </div>
                <div class="button-container">
                    <button onclick="getSuggestions()" class="btn-primary">
                        <span>Find Recipes</span>
                        <span class="btn-icon">→</span>
                    </button>
                    <button onclick="clearSelection()" class="btn-secondary">
                        Clear All
                    </button>
                </div>
            </section>

            <section class="results-section" id="results-section" style="display: none;">
                <div class="results-header">
                    <h2 class="section-title">Your Recipe Matches</h2>
                    <span id="recipe-count" class="recipe-count"></span>
                </div>
                <div id="recipe-list" class="recipe-grid"></div>
            </section>

            <div id="no-results" class="no-results" style="display: none;">
                <div class="no-results-icon">🔍</div>
                <h3>No recipes found</h3>
                <p>Try selecting different vegetables or add more to your selection</p>
            </div>
        </main>
    </div>

    <div id="recipe-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        function getSuggestions() {
            const checkboxes = document.querySelectorAll('#vegetables input[type=checkbox]');
            const selected = [];
            checkboxes.forEach(cb => {
                if (cb.checked) {
                    selected.push(cb.value);
                }
            });

            if (selected.length === 0) {
                document.getElementById('results-section').style.display = 'none';
                document.getElementById('no-results').style.display = 'none';
                return;
            }

            fetch('/suggest', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({vegetables: selected})
            })
            .then(response => response.json())
            .then(data => {
                const resultsSection = document.getElementById('results-section');
                const noResults = document.getElementById('no-results');
                const recipeList = document.getElementById('recipe-list');
                const recipeCount = document.getElementById('recipe-count');

                if (data.length === 0) {
                    resultsSection.style.display = 'none';
                    noResults.style.display = 'flex';
                } else {
                    noResults.style.display = 'none';
                    resultsSection.style.display = 'block';
                    recipeCount.textContent = `${data.length} recipe${data.length !== 1 ? 's' : ''} found`;

                    recipeList.innerHTML = '';
                    data.forEach(recipe => {
                        const card = createRecipeCard(recipe);
                        recipeList.appendChild(card);
                    });

                    resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            })
            .catch(error => {
                console.error('Error fetching recipes:', error);
            });
        }

        function createRecipeCard(recipe) {
            const card = document.createElement('div');
            card.className = 'recipe-card';
            card.onclick = () => showRecipeDetails(recipe);

            const difficultyClass = recipe.difficulty.toLowerCase();

            card.innerHTML = `
                <div class="recipe-card-header">
                    <h3 class="recipe-title">${recipe.name}</h3>
                    <span class="difficulty-badge ${difficultyClass}">${recipe.difficulty}</span>
                </div>
                <p class="recipe-description">${recipe.description}</p>
                <div class="recipe-meta">
                    <span class="meta-item">
                        <span class="meta-icon">⏱️</span>
                        ${recipe.cook_time}
                    </span>
                    <span class="meta-item">
                        <span class="meta-icon">🍽️</span>
                        ${recipe.servings} servings
                    </span>
                </div>
                <div class="recipe-vegetables">
                    ${recipe.vegetables.map(veg => `<span class="veg-tag">${veg}</span>`).join('')}
                </div>
                <div class="card-footer">
                    <span class="view-recipe">View Recipe →</span>
                </div>
            `;

            return card;
        }

        function showRecipeDetails(recipe) {
            const modal = document.getElementById('recipe-modal');
            const modalBody = document.getElementById('modal-body');

            modalBody.innerHTML = `
                <div class="recipe-details">
                    <div class="recipe-details-header">
                        <h2>${recipe.name}</h2>
                        <span class="difficulty-badge ${recipe.difficulty.toLowerCase()}">${recipe.difficulty}</span>
                    </div>
                    <p class="recipe-description-full">${recipe.description}</p>

                    <div class="recipe-meta-full">
                        <div class="meta-item-full">
                            <span class="meta-icon">⏱️</span>
                            <div>
                                <div class="meta-label">Cook Time</div>
                                <div class="meta-value">${recipe.cook_time}</div>
                            </div>
                        </div>
                        <div class="meta-item-full">
                            <span class="meta-icon">🍽️</span>
                            <div>
                                <div class="meta-label">Servings</div>
                                <div class="meta-value">${recipe.servings}</div>
                            </div>
                        </div>
                    </div>

                    <div class="recipe-section">
                        <h3>Ingredients</h3>
                        <ul class="ingredients-list">
                            ${recipe.ingredients.map(ing => `<li>${ing}</li>`).join('')}
                        </ul>
                    </div>

                    <div class="recipe-section">
                        <h3>Instructions</h3>
                        <p class="instructions">${recipe.instructions}</p>
                    </div>

                    <div class="recipe-vegetables-full">
                        <h4>Main Vegetables:</h4>
                        <div class="veg-tags-container">
                            ${recipe.vegetables.map(veg => `<span class="veg-tag">${veg}</span>`).join('')}
                        </div>
                    </div>
                </div>
            `;

            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('recipe-modal');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function clearSelection() {
            const checkboxes = document.querySelectorAll('#vegetables input[type=checkbox]');
            checkboxes.forEach(cb => cb.checked = false);
            document.getElementById('results-section').style.display = 'none';
            document.getElementById('no-results').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('recipe-modal');
            if (event.target === modal) {
                closeModal();
            }
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
