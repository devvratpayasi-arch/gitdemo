<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Finder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #f4f4f4, #e0e0e0);
            margin: 0;
            padding: 0;
            color: #333;
        }
        header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 20px;
            position: relative;
        }
        header::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

            opacity: 0.3;
            z-index: -1;
        }
        h1 {
            margin: 0;
            font-size: 2.5em;
        }
        .search-container {
            text-align: center;
            padding: 20px;
        }
        #search-input {
            width: 60%;
            padding: 10px;
            font-size: 1.2em;
            border: 2px solid #4CAF50;
            border-radius: 5px;
            outline: none;
        }
        #search-input:focus {
            border-color: #45a049;
        }
        .results {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .recipe-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin: 10px;
            width: 300px;
            overflow: hidden;
            transition: transform 0.3s;
        }
        .recipe-card:hover {
            transform: scale(1.05);
        }
        .recipe-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .recipe-card h3 {
            margin: 10px;
            color: #4CAF50;
        }
        .recipe-card p {
            margin: 10px;
        }
        .ingredients, .instructions, .precautions {
            margin: 10px;
        }
        .ingredients ul {
            list-style-type: disc;
            padding-left: 20px;
        }
        .precautions {
            background-color: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 10px;
        }
        footer {
            text-align: center;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>🍳 Recipe Finder</h1>
        <p>Discover delicious recipes with ingredients and precautions!</p>
    </header>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search for a recipe (e.g., Pasta, Salad, Biryani)">
    </div>
    <div class="results" id="results"></div>
    <footer>
        <p>&copy; 2023 Recipe Finder. Enjoy cooking safely!</p>
    </footer>

                ingredients: ["1 cup chickpeas", "Tomatoes, onions", "Spices (cumin, coriander, garam masala)", "Ginger, garlic", "Oil"],

                precautions: "Soak chickpeas overnight to reduce cooking time and improve digestibility. Rinse thoroughly to remove anti-nutrients. Cook on medium heat to avoid burning spices."

        const searchInput = document.getElementById('search-input');
        const resultsDiv = document.getElementById('results');

        function displayRecipes(filteredRecipes) {
            resultsDiv.innerHTML = '';
            filteredRecipes.forEach(recipe => {
                const card = document.createElement('div');
                card.className = 'recipe-card';
                card.innerHTML = `
                    <img src="${recipe.image}" alt="${recipe.name}">
                    <h3>${recipe.name}</h3>
                    <div class="ingredients">
                        <strong>Ingredients:</strong>
                        <ul>${recipe.ingredients.map(ing => `<li>${ing}</li>`).join('')}</ul>
                    </div>
                    <div class="instructions">
                        <strong>Instructions:</strong>
                        <p>${recipe.instructions}</p>
                    </div>
                    <div class="precautions">
                        <strong>Precautions:</strong>
                        <p>${recipe.precautions}</p>
                    </div>
                `;
                resultsDiv.appendChild(card);
            });
        }

        searchInput.addEventListener('input', () => {
            const query = searchInput.value.toLowerCase();
            const filtered = recipes.filter(recipe => recipe.name.toLowerCase().includes(query));
            displayRecipes(filtered);
        });

        // Display all recipes initially
        displayRecipes(recipes);
    </script>
</body>
</html>
